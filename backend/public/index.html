<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Issue Tracker | v1.0.5</title>
    <style>
        /* CSS VARIABLES FOR THEMING */
        :root {
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --text-color: #edf2f7;
            --accent-color: #4299e1;
            --border-color: #4a5568;
            --success: #2ecc71;
            --warning: #f1c40f;
        }

        /* LIGHT MODE OVERRIDES */
        body.light-mode {
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --accent-color: #3182ce;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 400px;
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 { margin: 0; color: var(--accent-color); font-size: 1.5rem; }

        #theme-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        #theme-btn:hover { background: rgba(66, 153, 225, 0.1); }

        .issue-list {
            min-height: 150px;
            max-height: 300px;
            overflow-y: auto;
            margin: 20px 0;
            border-top: 1px solid var(--border-color);
        }

        .status-bar {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dotted var(--border-color);
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #718096;
        }

        .dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        .badge {
            background: #4a5568;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            font-size: 9px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Issue Tracker</h2>
        <button id="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
    </div>

    <div class="issue-list" id="issueList">
        <div style="text-align: center; padding: 40px; color: var(--success); font-weight: bold;">
            ✓ System Healthy. No active tickets.
        </div>
    </div>

    <div class="status-bar">
        <div>
            <span id="status-dot" class="dot"></span> 
            <span id="env-mode">INITIALIZING...</span>
            <span class="badge">BUILD: v1.0.5-LIVE</span>
        </div>
        <div id="last-ping">--:--:--</div>
    </div>
</div>

<script>
    // THEME TOGGLE LOGIC
    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        const isLight = document.body.classList.contains('light-mode');
        localStorage.setItem('preferred-theme', isLight ? 'light' : 'dark');
    }

    // VISUAL PULSE LOGIC
    function updatePulse() {
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const envMode = document.getElementById("env-mode");
        const dot = document.getElementById("status-dot");
        
        envMode.innerText = isLocal ? "DEVELOPMENT" : "PRODUCTION";
        dot.style.background = isLocal ? "var(--warning)" : "var(--success)";
        document.getElementById("last-ping").innerText = new Date().toLocaleTimeString();
    }

    // INITIALIZATION
    window.onload = function() {
        // Apply saved theme
        if (localStorage.getItem('preferred-theme') === 'light') {
            document.body.classList.add('light-mode');
        }
        
        updatePulse();
        setInterval(updatePulse, 1000);
    };
</script>

</body>
</html>
