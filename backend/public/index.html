<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Issue Tracker</title>
  <style>
    :root {
      --primary: #3498db;
      --success: #2ecc71;
      --warning: #f1c40f;
      --dark: #2c3e50;
      --light: #f4f6f9;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--light);
      margin: 0;
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 60px;
    }

    .container { width: 100%; max-width: 500px; }

    .card {
      background: white;
      padding: 25px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      border-left: 5px solid var(--primary);
    }

    h1 { color: var(--dark); margin-bottom: 30px; }
    h3 { margin-top: 0; color: var(--dark); font-size: 1.1rem; }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      outline: none;
    }

    input:focus { border-color: var(--primary); }

    button {
      width: 100%;
      padding: 12px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s, background 0.2s;
    }

    button:hover { background: #2980b9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    /* Issue Ticket Styling */
    .issue-ticket {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 10px;
      border: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .status-pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
    }

    .status-pending { background: #fff3cd; color: #856404; }
    .status-resolved { background: #d4edda; color: #155724; }

    /* Toast Notification */
    #toast {
      visibility: hidden;
      min-width: 250px;
      background-color: var(--dark);
      color: #fff;
      text-align: center;
      border-radius: 8px;
      padding: 16px;
      position: fixed;
      z-index: 1001;
      bottom: 80px;
      font-size: 14px;
    }

    #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

    @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 80px; opacity: 1;} }
    @keyframes fadeout { from {bottom: 80px; opacity: 1;} to {bottom: 0; opacity: 0;} }

    /* Visual Pulse Bar */
    .status-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: var(--dark);
      color: white;
      padding: 10px 20px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      box-sizing: border-box;
    }

    .dot {
      height: 8px;
      width: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
  </style>
</head>
<body>

  <h1>Issue Tracker</h1>

  <div class="container">
    <div class="card">
      <h3>Set Identity</h3>
      <input id="username" placeholder="Enter your username">
    </div>

    <div class="card">
      <h3>New Issue</h3>
      <input id="title" placeholder="Describe the problem...">
      <button onclick="submitIssue()">Report Issue</button>
    </div>

    <div class="card">
      <h3>Quick Update</h3>
      <input id="issueId" placeholder="Issue ID">
      <input id="status" placeholder="New status (pending/resolved)">
      <button onclick="updateStatus()" style="background: var(--dark);">Change Status</button>
    </div>

    <div class="card" style="border-left-color: var(--success);">
      <h3>Track Issues</h3>
      <button onclick="loadUserIssues()">Load My Tickets</button>
      <div id="issueList"></div>
    </div>
  </div>

  <div id="toast">Message goes here</div>

  <div class="status-bar">
    <div><span id="status-dot" class="dot"></span> <span id="env-mode">Initializing...</span></div>
    <div>LAST SYNC: <span id="last-ping">--:--:--</span></div>
  </div>

  <script>
    const API = window.location.origin;

    function showToast(msg) {
      const x = document.getElementById("toast");
      x.innerText = msg;
      x.className = "show";
      setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
    }

    async function submitIssue() {
      const title = document.getElementById("title").value;
      const username = document.getElementById("username").value;
      if(!title || !username) return showToast("⚠️ Missing title or username");

      try {
        const res = await fetch(API + "/issue", {
          method: "POST",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ title, username })
        });
        const data = await res.json();
        showToast("✅ Created! ID: " + data.id);
        document.getElementById("title").value = "";
      } catch (err) { showToast("❌ Error connecting to server"); }
    }

    async function updateStatus() {
      const id = document.getElementById("issueId").value;
      const status = document.getElementById("status").value.toLowerCase();
      if(!id || !status) return showToast("⚠️ ID and Status required");

      try {
        const res = await fetch(API + `/issue/${id}/status`, {
          method: "PUT",
          headers: {"Content-Type": "application/json"},
          body: JSON.stringify({ status })
        });
        const data = await res.json();
        showToast(data.message || data.error);
      } catch (err) { showToast("❌ Update failed"); }
    }

    async function loadUserIssues() {
      const username = document.getElementById("username").value;
      if(!username) return showToast("⚠️ Enter a username first");

      try {
        const res = await fetch(API + `/user/${username}/issues`);
        const data = await res.json();
        
        let html = "";
        data.forEach(i => {
          const statusClass = i.status === 'resolved' ? 'status-resolved' : 'status-pending';
          html += `
            <div class="issue-ticket">
              <div>
                <strong>#${i.id}</strong><br>
                <small>${i.title}</small>
              </div>
              <span class="status-pill ${statusClass}">${i.status}</span>
            </div>`;
        });
        document.getElementById("issueList").innerHTML = html || "<p>No issues found.</p>";
      } catch (err) { showToast("❌ Could not load issues"); }
    }

    function updatePulse() {
      const envDisplay = document.getElementById("env-mode");
      const dot = document.getElementById("status-dot");
      const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
      
      envDisplay.innerText = isLocal ? "DEV MODE" : "PRODUCTION";
      dot.style.backgroundColor = isLocal ? "#f1c40f" : "#2ecc71";
      document.getElementById("last-ping").innerText = new Date().toLocaleTimeString();
    }

    updatePulse();
    setInterval(updatePulse, 30000);
  </script>
</body>
</html>
