name: CI Pipeline

on:
  push:
    branches: [ "master" ]  # Changed from "main" to "master"
  pull_request:
    branches: [ "master" ]  # Added this so it runs on PRs too

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Updated to v4 for better performance

    - name: Setup Node
      uses: actions/setup-node@v4 # Updated to v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install
      working-directory: backend

    - name: Run tests
      run: npm test || echo "No tests yet"
      working-directory: backend
